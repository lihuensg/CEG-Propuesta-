<nav class="navbar">
  <div class="navbar-left">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#10B981"/>
      </svg>
      <span class="logo-text">CEG</span>
    </div>
    
    <button class="hamburger-btn" (click)="toggleMobileMenu()" aria-label="Menu">
      @if (!isMobileMenuOpen) {
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      } @else {
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      }
    </button>
  </div>

  <div class="navbar-menu" [class.open]="isMobileMenuOpen">
    <div class="navbar-links">
      <a routerLink="/home" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/institucional" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Institucional</a>
      <a routerLink="/servicios" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Servicios</a>
      <a routerLink="/cegonline" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">CEGonline</a>
      <a routerLink="/contacto" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">Contacto</a>
    </div>

    <div class="navbar-right">
      <div class="theme-toggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        
        <label class="switch">
          <input type="checkbox" [checked]="isDarkMode" (change)="toggleTheme()">
          <span class="slider round"></span>
        </label>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </div>

      <button class="action-btn" (click)="openModal(); closeMobileMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Factura Electrónica
      </button>
    </div>
  </div>
</nav>

@if (isModalOpen) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Solicitar Factura Electrónica</h2>
        <button class="close-btn" (click)="closeModal()">&times;</button>
      </div>
      <form class="modal-form" (submit)="onSubmit($event)">
        <div class="form-group">
          <label for="nombre">Nombre y Apellido *</label>
          <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
        </div>

        <div class="form-group">
          <label for="usuario">Nro de Usuario *</label>
          <input type="text" id="usuario" name="usuario" required placeholder="Ej: 123456">
        </div>

        <div class="form-group">
          <label for="nis">Nro de NIS * <span class="hint">(Ver en su factura)</span></label>
          <input type="text" id="nis" name="nis" required placeholder="Ej: 987654321">
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required placeholder="Ej: juan@ejemplo.com">
        </div>

        <div class="form-checkbox">
          <input type="checkbox" id="acepto" name="acepto" required>
          <label for="acepto">Acepto el envío de mi factura</label>
        </div>

        <button type="submit" class="submit-btn action-btn">
          Enviar
        </button>
      </form>
    </div>
  </div>
}
